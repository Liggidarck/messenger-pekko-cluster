---
# Headless Service: нужен для внутренней маршрутизации и сборки кольца Cassandra.
# У него нет IP (clusterIP: None), он возвращает IP-адреса всех подов (cassandra-0, cassandra-1).
apiVersion: v1
kind: Service
metadata:
  name: cassandra-headless
  labels:
    app: cassandra
spec:
  clusterIP: None
  ports:
    - port: 9042
      name: cql
  selector:
    app: cassandra
---
apiVersion: v1
kind: Service
metadata:
  name: cassandra-service
  labels:
    app: cassandra
spec:
  type: ClusterIP
  ports:
    - port: 9042
      name: cql
      targetPort: 9042
  selector:
    app: cassandra