apiVersion: apps/v1
kind: Deployment
metadata:
  name: messenger-api-gateway
  labels:
    app: messenger-cluster
    role: gateway
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  selector:
    matchLabels:
      app: messenger-cluster
      role: gateway
  template:
    metadata:
      labels:
        app: messenger-cluster
        role: gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9095"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: messenger-service-account
      initContainers:
        - name: wait-for-cassandra
          image: busybox:1.31
          command: [ 'sh', '-c', 'until nc -z cassandra-service 9042; do echo "Waiting for Cassandra..."; sleep 2; done;' ]
      containers:
        - name: messenger-api-gateway
          image: {{ .Values.gateway.image }}
          imagePullPolicy: IfNotPresent
          env:
            - name: K8S_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: CLUSTER_PORT
              value: "25520"
            - name: CASSANDRA_CONTACT_POINTS
              value: "cassandra-service:9042"
          resources:
{{ toYaml .Values.gateway.resources | indent 12 }}
          ports:
            - name: http
              containerPort: 8080
            - name: management
              containerPort: 8558
            - name: remoting
              containerPort: 25520
            - name: metrics
              containerPort: 9095
          startupProbe:
            httpGet:
              path: /alive
              port: management
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: management
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /alive
              port: management
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 10
---
apiVersion: v1
kind: Service
metadata:
  name: messenger-gateway-service
spec:
  type: ClusterIP

  selector:
    role: gateway

  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080