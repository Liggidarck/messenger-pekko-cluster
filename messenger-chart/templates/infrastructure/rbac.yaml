apiVersion: v1
kind: ServiceAccount
metadata:
  name: messenger-service-account
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: messenger-cluster-reader
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - services
      - endpoints
      - pods
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: messenger-cluster-reader-binding
subjects:
  - kind: ServiceAccount
    name: messenger-service-account
    namespace: default
roleRef:
  kind: ClusterRole
  name: messenger-cluster-reader
  apiGroup: rbac.authorization.k8s.io